<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NZ 17 Days</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #F8F5FF; font-family: sans-serif; }
        .serif { font-family: 'Noto Serif TC', serif; font-weight: 900; }
        .card-shadow { box-shadow: 0 10px 25px rgba(107, 33, 168, 0.05); }
    </style>
</head>
<body>
    <div class="max-w-md mx-auto p-4 space-y-6">
        <h1 class="serif text-4xl text-purple-900 mt-8 mb-4 text-center">紐西蘭 17 天</h1>
        <p class="text-center text-purple-400 text-sm tracking-widest mb-10">SUMMER TOUR 2026</p>

        <div class="bg-white rounded-[24px] overflow-hidden card-shadow">
            <img src="https://images.unsplash.com/photo-1598091857921-b054817a7833?w=800" class="w-full h-48 object-cover">
            <div class="p-6">
                <span class="text-purple-300 text-xs font-bold">DAY 01 · 6/5</span>
                <h2 class="serif text-xl text-purple-900 mt-1">基督城啟程</h2>
                <p class="text-gray-500 text-sm mt-2 leading-relaxed">抵達南島基督城，機場取車後漫步雅芳河畔，調整時差。</p>
            </div>
        </div>

        <div class="bg-white rounded-[24px] overflow-hidden card-shadow">
            <img src="https://images.unsplash.com/photo-1621200115016-1681a2988f62?w=800" class="w-full h-48 object-cover">
            <div class="p-6">
                <span class="text-purple-300 text-xs font-bold">DAY 02 · 6/6</span>
                <h2 class="serif text-xl text-purple-900 mt-1">蒂卡波湖星空</h2>
                <p class="text-gray-500 text-sm mt-2 leading-relaxed">拜訪牧羊人教堂，在世界級暗空保護區看銀河。</p>
            </div>
        </div>

        <div class="bg-white rounded-[24px] overflow-hidden card-shadow">
            <img src="https://images.unsplash.com/photo-1600109915409-760778732a39?w=800" class="w-full h-48 object-cover">
            <div class="p-6">
                <span class="text-purple-300 text-xs font-bold">DAY 03 · 6/7</span>
                <h2 class="serif text-xl text-purple-900 mt-1">庫克山健行</h2>
                <p class="text-gray-500 text-sm mt-2 leading-relaxed">Hooker Valley Track 健行，近距離看冰川與浮冰。</p>
            </div>
        </div>

        <div class="text-center py-10 text-purple-200 serif text-xs italic">
            ... 精采行程持續載入中 ...
        </div>
    </div>
</body>
</html>
